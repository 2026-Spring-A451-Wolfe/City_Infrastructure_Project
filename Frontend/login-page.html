<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Road Report</title>
  <link rel="stylesheet" href="./Infrastructure-Reporter.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="top-bar">
        <div class="top-bar__menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1 class="top-bar__title">NOLA Road Reporter</h1>

        <div class="top-bar__profile">Profile</div>
    </header>

  <!-- Hero Section -->
  <section class="login-hero">
    <h2 class="login-hero__title">Welcome Back</h2>
    <p class="login-hero__subtitle">
      Sign in to submit and track road reports.
    </p>
  </section>

  <!-- Login Card -->
  <main>
  <form id="loginForm" class="login-card">
    
    <input 
      id="username"
      type="text" 
      placeholder="Username" 
      required
    >

    <input 
      id="password"
      type="password" 
      placeholder="Password" 
      required
    >


      <button type="submit" class="login-card__button">
        Login
      </button>
  </form>
</main>
      <div class="login-card__footer">
        Don't have an account?
        <a href="userRegistration.html" class="login-card__link">Sign Up</a>
      </div>
    </form>
  </main>
  <!-- MAP SECTION -->
<section class="map-section">
  <h2 class="map-section__title">Reported Potholes in NOLA</h2>
  <div id="map"></div>
</section>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([29.9511, -90.0715], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Example pothole markers
  const potholes = [
    { lat: 29.9511, lng: -90.0715, desc: "Large pothole near Canal St." },
    { lat: 29.9430, lng: -90.0820, desc: "Cracked pavement by Magazine St." },
    { lat: 29.9600, lng: -90.1000, desc: "Deep pothole near City Park." }
  ];

  potholes.forEach(pothole => {
    L.marker([pothole.lat, pothole.lng])
      .addTo(map)
      .bindPopup(`<b>Pothole Report</b><br>${pothole.desc}`);
  });
</script>

<footer class="main-footer">
    loyola university new orleans swe class project etc etc
</footer>
<script src="shared-hamburger-menu.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
      const response = await fetch("http://localhost:3000/api/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: username,
          password: password
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || "Invalid username or password");
      }

      localStorage.setItem("token", data.token);
      alert("Login successful!");
      window.location.href = "infrastructure.html";
    } catch (error) {
      console.error("Login error:", error);
      alert(error.message);
    }
  });
</script>

</body>
</html>
