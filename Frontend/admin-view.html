<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADMIN</title>
    <link rel="stylesheet" href="./Infrastructure-Reporter.css">
    <link rel="stylesheet" href="./admin-view.css">
</head>

<body>
    <header class="top-bar">
        <div class="top-bar__menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1 class="top-bar__title">ADMIN</h1>
        <div class="top-bar__profile">Admin</div>
    </header>

    <nav class="sub-nav">
        <a href="dashboard-page.html">Dashboard</a>
        <a href="report-tracking-page.html">Reports</a>
        <a href="updates-page.html">Updates</a>
        <a href="admin-view.html">Admin</a>
    </nav>

    <div class="layout">
        <div class="admin-layout">
            <main class="admin-page">

                <!-- REPORT LIST -->
                <section class="admin-reports-list">
                    <h2>Report Queue</h2>
                    <p>Select a report to review and update.</p>

                    <div id="reports-status">
                        Loading reports...
                    </div>
                </section>

                <!-- REPORT DETAILS -->
                <section class="admin-view-report">

                    <h2>Report Details</h2>
                    <p>Review, assign, and update issue status.</p>

                    <div>
                        <div>Submitter</div>
                        <div>No image attached</div>
                    </div>

                    <div>Map location preview</div>

                    <div>
                        <h3>Problem Description</h3>
                        <p id="report-description">
                            Select a report to view details.
                        </p>
                    </div>

                    <!-- STATUS -->
                    <label>Status:</label>
                    <select id="status-select">
                        <option value="submitted">Submitted</option>
                        <option value="under-review">Under Review</option>
                        <option value="in-progress">In Progress</option>
                        <option value="halted-on-pause">Halted / On Pause</option>
                        <option value="rejected">Rejected</option>
                        <option value="done">Done</option>
                    </select>

                    <!-- DEPARTMENT -->
                    <label>Department:</label>
                    <select id="department-select">
                        <option>Loading departments...</option>
                    </select>

                    <!-- BUDGET -->
                    <label>Budget:</label>
                    <input type="number" id="budget" min="0">

                    <!-- STATUS MESSAGE -->
                    <div id="status-message"></div>

                    <!-- BUTTON -->
                    <button id="save-btn">Save Updates</button>

                </section>
            </main>
        </div>
    </div>

    <script src="admin-view.js"></script>
</body>
</html>
