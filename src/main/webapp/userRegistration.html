<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="Infrastructure-Reporter.css">
</head>

<body>
    <header class="top-bar">
        <div class="top-bar__menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1 class="top-bar__title">Register your Account!</h1>
        <div class="top-bar__profile">Profile</div>
    </header>

    <section class="submission-hero">
        <h2 class="submission-hero__title">Sign Up for an Account</h2>
        <p class="submission-hero__subtitle">Thank you for your interest in helping to repair the city!</p>
        <p class="submission-hero__subtitle">
            Sign up to <span style="color: #213d55;">send in reports</span> and
            <span style="color: #213d55;">track their status.</span>
        </p>
    </section>

    <main class="registration-section">
        <form id="registrationForm" class="registration-form">
            <input
                id="email"
                name="email"
                class="registration-section__input"
                type="email"
                placeholder="Email address:"
                required
            >

            <input
                id="password"
                name="password"
                class="registration-section__input"
                type="password"
                placeholder="Password:"
                required
            >

            <input
                id="confirmPassword"
                name="confirmPassword"
                class="registration-section__input"
                type="password"
                placeholder="Re-enter password:"
                required
            >

            <button
                id="signupButton"
                type="submit"
                class="registration-section__button"
            >
                Sign up!
            </button>

            <p id="confirmation" class="confirmation" aria-live="polite"></p>
        </form>
    </main>

    <footer class="main-footer">
        loyola university new orleans swe class project etc etc
    </footer>

    <script src="shared-hamburger-menu.js"></script>
    <script src="userRegistration.js"></script>
</body>
</html>
