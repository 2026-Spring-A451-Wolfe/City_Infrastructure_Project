services:
  back-api:
    build:
      context: .
      dockerfile: ./BackAPI/Dockerfile
    container_name: back-api
    env_file:
    - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JDBC_URL: jdbc:postgresql://db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "5050:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./DB/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

